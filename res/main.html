<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss Cheese Learner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
    <script src="webui.js"></script>
    <script>
        let text_buf = '';
        let buf_dirty = true;
        let placeholder = '*';

        function is_string_null(string){
            return string === null || string === undefined || string === "";
        }

        function split_word(){
            const words = text_buf.split(/\s+/);
            buf_dirty = false;
            return words || [];
        }

        function update_textfield(){
            const container = document.getElementById('text-container');
            
            if (is_string_null(text_buf) || !buf_dirty) {
                return; // But why call it ...
            }

            // A clean slate
            while(container.firstChild) {
                container.removeChild(container.firstChild);
            }

            const words = split_word(text_buf);
            
            words.forEach(word => {
                const span = document.createElement('span');
                span.textContent = word;
                span.className = "word";
                span.setAttribute('data-original', word);
                span.setAttribute('data-masked', false);
                span.addEventListener('click', function () {
                    const is_masked = 
                        this.getAttribute('data-masked') === 'true';
                    const org_word = this.getAttribute('data-original');

                    if (is_masked) {
                        this.textContent = org_word;
                        this.setAttribute('data-masked', false);
                    } else {
                        const masked_text = 
                            placeholder.repeat(org_word.length)
                        this.textContent = masked_text;
                        this.setAttribute('data-masked', true);
                    }

                });
                container.appendChild(span);
                container.appendChild(document.createTextNode(' '));
            });

        }
    </script>
    <style>
        #text-container {
            font-family: Arial, sans-serif;
            font-size: 16px;
            line-height: 1.5;
        }

        .word {
            cursor: pointer;
            border-radius: 3px;
            transition: background-color 0.2s;
            user-select: none;
        }

        .word:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>

<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div id="text-container" class="text-break fs-4 mb-4 
                    p-3 bg-white border rounded shadow-sm">

                </div>
            </div>
        </div>

        <button type="button" class="btn btn-primary m-3" id="ent"
        data-bs-toggle="modal" data-bs-target="#textModal">
        Update Original Text
        </button>
    </div>

    <div class="modal fade" id="textModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Update Original Text</h5>
                </div>
                <div class="modal-body">
                    
                    <p>
                        Enter the original text below. Currently, only English
                        is supported.
                    </p>
                    <textarea class="form-control" 
                    rows="5" id="userText"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" 
                    data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" 
                    id="submitText" data-bs-dismiss="modal">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('submitText').addEventListener(
            'click',
            function(){
                const ta = document.getElementById('userText')
                text_buf = ta.value;
                update_textfield();
            }
        )
    </script>

</body>

</html>
