<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss Cheese Learner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
    <script src="webui.js"></script>
    <script>
        let text_buf = '';
        let buf_dirty = true;
        let placeholder = '*';

        function is_string_null(string) {
            return string === null || string === undefined || string === "";
        }

        function split_word() {
            const word_iter = text_buf.matchAll(/\w+|\s|\W/gm);
            let words = [];
            for (const word of word_iter) {
                words.push(word);
            }
            return words;
        }

        function update_textfield() {
            const container = document.getElementById('text-container');

            if (is_string_null(text_buf) || !buf_dirty) {
                return; // But why call it ...
            }

            // A clean slate
            while (container.firstChild) {
                container.removeChild(container.firstChild);
            }

            const words = split_word(text_buf);

            words.forEach(word => {
                /// There are two types of `word`, one is actual word, another
                /// is punctuation or whitespace. 

                const is_not_actual_word = new RegExp(/^[\W]{1}$/gmv);
                const result = is_not_actual_word.test(word);

                if (!result) {
                    const span = document.createElement('span');
                    span.textContent = word;
                    span.className = "word";
                    span.setAttribute('data-original', word);
                    span.setAttribute('data-masked', false);
                    span.addEventListener('click', function () {
                        const is_masked =
                            this.getAttribute('data-masked') === 'true';
                        const org_word = this.getAttribute('data-original');

                        if (is_masked) {
                            this.textContent = org_word;
                            this.setAttribute('data-masked', false);
                        } else {
                            const masked_text =
                                placeholder.repeat(org_word.length)
                            this.textContent = masked_text;
                            this.setAttribute('data-masked', true);
                        }

                    });
                    container.appendChild(span);
                } else {
                    if (word != "\n") {
                        container.appendChild(document.createTextNode(word));
                    } else {
                        container.appendChild(document.createElement('br'));
                    }
                }
            });

        }

        function mask_text(mode) {
            const container = document.getElementById('text-container');
            let interval = true;
            let children = container.children;
            switch (mode) {
                case 0:
                    interval = true;
                    for (let child of children) {
                        let s = child;
                        if (s.nodeName.toLowerCase() != 'span') {
                            continue;
                        }
                        let w_org = s.getAttribute('data-original');
                        if (interval) {
                            const masked_text =
                                placeholder.repeat(w_org.length);
                            s.textContent = masked_text;
                            s.setAttribute('data-masked', true);
                            interval = false;
                        } else {
                            s.textContent = w_org;
                            s.setAttribute('data-masked', false);
                            interval = true;
                        }
                    }
                    break;
                case 1:
                    interval = false;
                    for (let child of children) {
                        let s = child;
                        if (s.nodeName.toLowerCase() != 'span') {
                            continue;
                        }
                        let w_org = s.getAttribute('data-original');
                        if (interval) {
                            const masked_text =
                                placeholder.repeat(w_org.length);
                            s.textContent = masked_text;
                            s.setAttribute('data-masked', true);
                            interval = false;
                        } else {
                            s.textContent = w_org;
                            s.setAttribute('data-masked', false);
                            interval = true;
                        }
                    }
                    break;
                case 2:
                    for (let child of children) {
                        let s = child;
                        if (s.nodeName.toLowerCase() != 'span') {
                            continue;
                        }
                        let w_org = s.getAttribute('data-original');
                        const masked_text = placeholder.repeat(w_org.length);
                        s.textContent = masked_text;
                        s.setAttribute('data-masked', true);
                    }
                    break;
                case 3:
                    for (let child of children) {
                        let s = child;
                        if (s.nodeName.toLowerCase() != 'span') {
                            continue;
                        }
                        let w_org = s.getAttribute('data-original');
                        s.textContent = w_org;
                        s.setAttribute('data-masked', false);
                    }
                    break;
            }
        }

        // Listener binding after load completed.
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('submitText').addEventListener(
                'click',
                function () {
                    const ta = document.getElementById('userText')
                    text_buf = ta.value;
                    buf_dirty = true;
                    update_textfield();
                }
            )
        });
    </script>
    <style>
        #text-container {
            font-family: monospace;
            font-size: 16px;
            line-height: 1.5;
            user-select: none;
        }

        .word {
            cursor: pointer;
            border-radius: 3px;
            transition: background-color 0.2s;
            user-select: none;
        }

        .word:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="https://github.com/Rodent-Nick/Swiss-Cheese-Learner" target="_blank">
                <b><u>Swiss Cheese Learner</u></b>
            </a>
            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <button class="btn m-3 text-white dropdown-toggle" data-bs-toggle="dropdown">
                        Apply Mask Pattern
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="javascript:mask_text(0);">
                                Interval (A)
                            </a></li>
                        <li><a class="dropdown-item" href="javascript:mask_text(1);">
                                Interval (B)
                            </a></li>
                        <li><a class="dropdown-item" href="javascript:mask_text(2);">
                                All Masked
                            </a></li>
                        <li><a class="dropdown-item" href="javascript:mask_text(3);">
                                All Clear
                            </a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <button class="btn m-3 bg-light" id="ent" data-bs-toggle="modal" data-bs-target="#textModal">
                        Update Text
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container-fluid py-5 h-80">
        <div class="row">
            <div class="col-md-12 col-lg-12">
                <div id="text-container" class="text-break fs-4 mb-4 
                    p-3 bg-white border rounded shadow-sm">
                    NO TEXT
                </div>
            </div>
        </div>

        <!-- <div class="row">
            <button type="button" class="btn btn-primary m-3 col-md-2" id="ent"
                data-bs-toggle="modal" data-bs-target="#textModal">
                Update Original Text
            </button> -->
    </div>

    </div>

    <div class="modal fade" id="textModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Update Original Text</h5>
                </div>
                <div class="modal-body">

                    <p>
                        Enter the original text below. Currently, only English
                        is supported. This will remove any mask setting on the
                        current text.
                    </p>
                    <textarea class="form-control" rows="5" id="userText"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="submitText"
                        data-bs-dismiss="modal">Submit</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
